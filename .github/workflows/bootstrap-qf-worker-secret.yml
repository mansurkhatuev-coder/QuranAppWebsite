name: Bootstrap QF Worker Secret

# One-time: Actions → Bootstrap QF Worker Secret → Run workflow
# Paste production QF_CLIENT_SECRET (not stored in GitHub; uploaded to Cloudflare only).

on:
  workflow_dispatch:
    inputs:
      qf_client_secret:
        description: Quran Foundation production client_secret
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --prefix qf-proxy wrangler@4

      - name: Upload secret to Cloudflare Worker
        working-directory: qf-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: printf '%s' '${{ inputs.qf_client_secret }}' | npx wrangler secret put QF_CLIENT_SECRET

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: qf-proxy
          command: deploy
