name: Bootstrap QF Worker Secret

# Actions → Bootstrap QF Worker Secret → Run workflow (one-time).
# Paste production QF_CLIENT_SECRET — stored on Cloudflare only.

on:
  workflow_dispatch:
    inputs:
      qf_client_secret:
        description: Quran Foundation production client_secret
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: qf-proxy/package-lock.json

      - name: Install dependencies
        working-directory: qf-proxy
        run: npm ci

      - name: Ensure worker is deployed
        working-directory: qf-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Upload secret to Cloudflare Worker
        working-directory: qf-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: printf '%s' '${{ inputs.qf_client_secret }}' | npx wrangler secret put QF_CLIENT_SECRET
