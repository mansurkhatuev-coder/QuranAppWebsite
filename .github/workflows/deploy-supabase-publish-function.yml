name: Deploy Supabase publish-content function

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure Supabase secrets for Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_PUBLISH_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN repository secret"
            exit 1
          fi
          if [ -z "$GITHUB_PUBLISH_TOKEN" ]; then
            echo "Missing GITHUB_PUBLISH_TOKEN repository secret"
            exit 1
          fi
          supabase secrets set \
            --project-ref rivjkiksknnesahrvamf \
            GITHUB_TOKEN="$GITHUB_PUBLISH_TOKEN" \
            GITHUB_REPO=mansurkhatuev-coder/QuranAppWebsite

      - name: Deploy publish-content Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy publish-content \
            --project-ref rivjkiksknnesahrvamf \
            --no-verify-jwt \
            --use-api
